# Contact Page Content

seo:
  title: "Contact Us"
  description: "Get in touch with Dancing Dots. We'd love to hear from you – whether you have a question about our syllabuses, need support, or just want to say hello."

heading: "Get in Touch"
subheading: "We'd love to hear from you."
intro: "Fill in the form below and we'll get back to you as soon as we can. Alternatively, email us directly at hello@dancingdots.co.uk"

form_fields:
  - name: "name"
    label: "Your Name"
    type: "text"
    required: true
  - name: "email"
    label: "Email Address"
    type: "email"
    required: true
  - name: "phone"
    label: "Phone Number (inc. country code)"
    type: "tel"
    required: false
  - name: "message"
    label: "Message"
    type: "textarea"
    required: true

submit_label: "Send Message"
success_message: "Thank you! We'll be in touch soon."

# Social links shown on contact page
show_social: true
